<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./dist/form-zen.min.css">
    <title>FormZen</title>
  </head>
  <body>
    <div id="myForm"></div>

    <script src="./dist/cdn.global.min.js"></script>

    <script>
      const formZen = new FormZen("#myForm");
      formZen.addFields({
        name: {
          label: "Name",
          type: "text",
        }
      });
      formZen.addButtonSubmit("test");
      formZen.addCallback((data) => {
        console.log("Form submitted with data:", data);
      });
    </script>
  </body>
</html>
